<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AwnCart User Form</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  }

  .form-container {
    background: white;
    padding: 40px 35px;
    width: 380px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: slideUp 0.7s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .brand {
    text-align: center;
    margin-bottom: 25px;
  }

  .brand h1 {
    color: #2c5364;
    font-size: 28px;
  }

  .brand p {
    color: #777;
    font-size: 14px;
  }

  .input-group {
    margin-bottom: 18px;
  }

  .input-group label {
    font-size: 13px;
    color: #444;
  }

  .input-group input {
    width: 100%;
    padding: 11px 12px;
    margin-top: 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    transition: all 0.3s ease;
    outline: none;
  }

  .input-group input:focus {
    border-color: #2c5364;
    box-shadow: 0 0 6px rgba(44,83,100,0.35);
  }

  button {
    width: 100%;
    padding: 12px;
    background: #2c5364;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: #203a43;
    transform: translateY(-2px);
  }

  .footer-text {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #777;
  }
</style>
</head>

<body>

<div class="form-container">

  <div class="brand">
    <h1>AwnCart</h1>
    <p>Shopping made smarter</p>
  </div>

  <form action="/submit" method="POST">

    <div class="input-group">
      <label>Name</label>
      <input type="text" name="name" placeholder="Enter your name" required>
    </div>

    <div class="input-group">
      <label>Age</label>
      <input type="number" name="age" placeholder="Enter your age" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <a href="../propage.html"><button type="submit">Submit</button></a>

  </form>

  <div class="footer-text">
    Welcome to AwnCart user registration
  </div>

</div>

</body>
</html>
